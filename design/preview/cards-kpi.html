<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#F7F8FA;font-family:var(--gu-font-sans);color:var(--gu-fg1)}
.wrap{padding:20px;display:flex;gap:14px}
.card{flex:1;background:#fff;border:1px solid #EAECEF;border-radius:12px;padding:16px;box-shadow:var(--gu-shadow-sm)}
.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.title{font-size:12px;color:var(--gu-fg3);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.val{font-family:var(--gu-font-mono);font-variant-numeric:tabular-nums;font-size:24px;font-weight:700;letter-spacing:-.02em}
.delta{font-family:var(--gu-font-mono);font-size:12px;font-weight:600;margin-top:4px}
.up{color:var(--gu-up)}
.down{color:var(--gu-down)}
.spark{margin-top:10px;height:32px}
</style></head><body>
<div class="wrap">
  <div class="card">
    <div class="head"><div class="title">총 자산 · Net Worth</div></div>
    <div class="val">₩128,490,210</div>
    <div class="delta up">▲ +3,120,000 (+2.48%)</div>
    <svg class="spark" viewBox="0 0 200 32" preserveAspectRatio="none"><polyline fill="none" stroke="#F24147" stroke-width="2" points="0,22 20,24 40,18 60,20 80,14 100,16 120,10 140,12 160,6 180,8 200,4"/></svg>
  </div>
  <div class="card">
    <div class="head"><div class="title">코인 · Crypto</div></div>
    <div class="val">₩42,108,000</div>
    <div class="delta down">▼ −412,800 (−0.97%)</div>
    <svg class="spark" viewBox="0 0 200 32" preserveAspectRatio="none"><polyline fill="none" stroke="#1967D2" stroke-width="2" points="0,6 20,8 40,14 60,12 80,16 100,14 120,20 140,22 160,18 180,24 200,22"/></svg>
  </div>
  <div class="card">
    <div class="head"><div class="title">주식 · Equities</div></div>
    <div class="val">₩86,382,210</div>
    <div class="delta up">▲ +3,532,800 (+4.28%)</div>
    <svg class="spark" viewBox="0 0 200 32" preserveAspectRatio="none"><polyline fill="none" stroke="#F24147" stroke-width="2" points="0,24 20,20 40,22 60,16 80,18 100,10 120,12 140,8 160,10 180,4 200,2"/></svg>
  </div>
</div>
</body></html>
