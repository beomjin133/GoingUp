<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#fff;font-family:var(--gu-font-sans);color:var(--gu-fg1)}
.wrap{padding:24px;display:flex;gap:22px;align-items:flex-end}
.cell{display:flex;flex-direction:column;align-items:center;gap:6px}
.box{background:var(--gu-brand-primary-soft);border:1px dashed var(--gu-brand-primary);border-radius:4px}
.v{font-family:var(--gu-font-mono);font-size:11px;color:var(--gu-fg3)}
.n{font-size:11px;color:var(--gu-fg2);font-weight:600}
</style></head><body>
<div class="wrap">
  <div class="cell"><div class="box" style="width:4px;height:4px"></div><div class="n">s1</div><div class="v">4</div></div>
  <div class="cell"><div class="box" style="width:8px;height:8px"></div><div class="n">s2</div><div class="v">8</div></div>
  <div class="cell"><div class="box" style="width:12px;height:12px"></div><div class="n">s3</div><div class="v">12</div></div>
  <div class="cell"><div class="box" style="width:16px;height:16px"></div><div class="n">s4</div><div class="v">16</div></div>
  <div class="cell"><div class="box" style="width:20px;height:20px"></div><div class="n">s5</div><div class="v">20</div></div>
  <div class="cell"><div class="box" style="width:24px;height:24px"></div><div class="n">s6</div><div class="v">24</div></div>
  <div class="cell"><div class="box" style="width:32px;height:32px"></div><div class="n">s8</div><div class="v">32</div></div>
  <div class="cell"><div class="box" style="width:48px;height:48px"></div><div class="n">s12</div><div class="v">48</div></div>
  <div class="cell"><div class="box" style="width:64px;height:64px"></div><div class="n">s16</div><div class="v">64</div></div>
</div>
</body></html>
