<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#F7F8FA;font-family:var(--gu-font-sans);color:var(--gu-fg1)}
.wrap{padding:28px;display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.cell{display:flex;flex-direction:column;align-items:center;gap:10px}
.box{width:100px;height:64px;background:#fff;border-radius:10px}
.n{font-size:11px;font-weight:600}
.v{font-family:var(--gu-font-mono);font-size:10px;color:var(--gu-fg3)}
</style></head><body>
<div class="wrap">
  <div class="cell"><div class="box" style="box-shadow:var(--gu-shadow-xs)"></div><div class="n">xs</div><div class="v">hover chip</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--gu-shadow-sm)"></div><div class="n">sm</div><div class="v">cards</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--gu-shadow-md)"></div><div class="n">md</div><div class="v">dropdowns</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--gu-shadow-lg)"></div><div class="n">lg</div><div class="v">modals</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--gu-shadow-focus);border:2px solid #1A55F0"></div><div class="n">focus</div><div class="v">3px ring</div></div>
</div>
</body></html>
