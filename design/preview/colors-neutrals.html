<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#fff;font-family:var(--gu-font-sans);color:var(--gu-fg1)}
.wrap{padding:22px}
.row{display:flex;gap:8px;margin-bottom:10px}
.sw{flex:1;height:56px;border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;border:1px solid rgba(0,0,0,.04)}
.name{font-size:10px;font-weight:600;line-height:1}
.hex{font-family:var(--gu-font-mono);font-size:9px;opacity:.65;margin-top:2px}
.section-lbl{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--gu-fg3);font-weight:600;margin-bottom:6px}
</style></head><body>
<div class="wrap">
  <div class="section-lbl">Neutrals</div>
  <div class="row">
    <div class="sw" style="background:#FFFFFF"><div class="name">bg</div><div class="hex">#FFFFFF</div></div>
    <div class="sw" style="background:#FBFCFD"><div class="name">bg-panel</div><div class="hex">#FBFCFD</div></div>
    <div class="sw" style="background:#F7F8FA"><div class="name">bg-alt</div><div class="hex">#F7F8FA</div></div>
    <div class="sw" style="background:#F0F2F5"><div class="name">divider</div><div class="hex">#F0F2F5</div></div>
    <div class="sw" style="background:#EAECEF"><div class="name">border</div><div class="hex">#EAECEF</div></div>
    <div class="sw" style="background:#D8DCE2"><div class="name">border-strong</div><div class="hex">#D8DCE2</div></div>
  </div>
  <div class="section-lbl">Text</div>
  <div class="row">
    <div class="sw" style="background:#9AA4B0;color:#fff"><div class="name">fg4</div><div class="hex">#9AA4B0</div></div>
    <div class="sw" style="background:#6B7684;color:#fff"><div class="name">fg3</div><div class="hex">#6B7684</div></div>
    <div class="sw" style="background:#454C56;color:#fff"><div class="name">fg2</div><div class="hex">#454C56</div></div>
    <div class="sw" style="background:#0F1419;color:#fff"><div class="name">fg1</div><div class="hex">#0F1419</div></div>
  </div>
</div>
</body></html>
