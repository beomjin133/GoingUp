<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#fff;font-family:var(--gu-font-sans);color:var(--gu-fg1)}
.wrap{padding:22px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.cell{display:flex;flex-direction:column;align-items:center;gap:8px}
.box{width:72px;height:48px;background:#fff;border:1px solid var(--gu-border)}
.n{font-size:11px;color:var(--gu-fg2);font-weight:600}
.v{font-family:var(--gu-font-mono);font-size:10px;color:var(--gu-fg3)}
</style></head><body>
<div class="wrap">
  <div class="cell"><div class="box" style="border-radius:4px"></div><div class="n">xs</div><div class="v">4px</div></div>
  <div class="cell"><div class="box" style="border-radius:6px"></div><div class="n">sm</div><div class="v">6px</div></div>
  <div class="cell"><div class="box" style="border-radius:8px"></div><div class="n">md</div><div class="v">8px · default</div></div>
  <div class="cell"><div class="box" style="border-radius:12px"></div><div class="n">lg</div><div class="v">12px · cards</div></div>
  <div class="cell"><div class="box" style="border-radius:16px"></div><div class="n">xl</div><div class="v">16px · hero</div></div>
  <div class="cell"><div class="box" style="border-radius:999px"></div><div class="n">pill</div><div class="v">∞ · tags</div></div>
</div>
</body></html>
