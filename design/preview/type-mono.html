<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#fff;font-family:var(--gu-font-sans);color:var(--gu-fg1)}
.wrap{padding:24px}
.row{display:grid;grid-template-columns:120px 1fr 1fr;gap:16px;align-items:center;padding:10px 0;border-bottom:1px solid var(--gu-divider)}
.row:last-child{border:none}
.lbl{font-family:var(--gu-font-mono);font-size:10px;color:var(--gu-fg3)}
.num{font-family:var(--gu-font-mono);font-variant-numeric:tabular-nums}
.num.up{color:var(--gu-up)}
.num.down{color:var(--gu-down)}
</style></head><body>
<div class="wrap">
  <div class="row"><div class="lbl">Price · XL 32</div><div class="num up" style="font-size:32px;font-weight:700">₩94,210,000</div><div class="num down" style="font-size:32px;font-weight:700">$67,412.50</div></div>
  <div class="row"><div class="lbl">Row · 14</div><div class="num up" style="font-size:14px">+2,340,000 (+2.54%)</div><div class="num down" style="font-size:14px">−412.80 (−0.61%)</div></div>
  <div class="row"><div class="lbl">Tabular · 13</div><div class="num" style="font-size:13px">0.00412814 BTC</div><div class="num" style="font-size:13px">₩1,284,500,310</div></div>
  <div class="row"><div class="lbl">Micro · 11</div><div class="num" style="font-size:11px;color:var(--gu-fg3)">24h vol 1,203,491</div><div class="num" style="font-size:11px;color:var(--gu-fg3)">09:12:44.812</div></div>
</div>
</body></html>
