<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#fff;font-family:var(--gu-font-sans);color:var(--gu-fg1)}
.wrap{padding:14px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:11px;color:var(--gu-fg3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;text-align:right;padding:6px 10px;border-bottom:1px solid #EAECEF}
th:first-child{text-align:left}
td{padding:9px 10px;border-bottom:1px solid #F0F2F5;text-align:right;font-family:var(--gu-font-mono);font-variant-numeric:tabular-nums}
td:first-child{text-align:left;font-family:var(--gu-font-sans);font-weight:600}
.tkr{color:var(--gu-fg3);font-family:var(--gu-font-mono);font-weight:400;font-size:11px;margin-left:6px}
.up{color:var(--gu-up)}
.down{color:var(--gu-down)}
tr:hover td{background:#FBFCFD}
</style></head><body>
<div class="wrap">
<table>
  <thead><tr><th>종목</th><th>현재가</th><th>전일대비</th><th>거래대금</th></tr></thead>
  <tbody>
    <tr><td>비트코인<span class="tkr">BTC</span></td><td>94,210,000</td><td class="up">+2.54%</td><td>1.2조</td></tr>
    <tr><td>이더리움<span class="tkr">ETH</span></td><td>4,812,500</td><td class="up">+1.88%</td><td>4,210억</td></tr>
    <tr><td>리플<span class="tkr">XRP</span></td><td>3,124</td><td class="down">−0.94%</td><td>2,812억</td></tr>
    <tr><td>솔라나<span class="tkr">SOL</span></td><td>348,200</td><td class="up">+5.12%</td><td>1,048억</td></tr>
    <tr><td>삼성전자<span class="tkr">005930</span></td><td>82,400</td><td class="down">−0.24%</td><td>5,210억</td></tr>
  </tbody>
</table>
</div>
</body></html>
