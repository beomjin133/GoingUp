<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#0B0D10;font-family:var(--gu-font-sans);color:#F2F4F7}
.wrap{padding:22px}
.row{display:flex;gap:8px;margin-bottom:10px}
.sw{flex:1;height:52px;border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;border:1px solid rgba(255,255,255,.06)}
.name{font-size:10px;font-weight:600;line-height:1}
.hex{font-family:var(--gu-font-mono);font-size:9px;opacity:.6;margin-top:2px}
.section-lbl{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#8B94A0;font-weight:600;margin-bottom:6px}
</style></head><body>
<div class="wrap">
  <div class="section-lbl">Dark surfaces</div>
  <div class="row">
    <div class="sw" style="background:#0B0D10"><div class="name">bg</div><div class="hex">#0B0D10</div></div>
    <div class="sw" style="background:#0F1216"><div class="name">bg-alt</div><div class="hex">#0F1216</div></div>
    <div class="sw" style="background:#14181D"><div class="name">surface</div><div class="hex">#14181D</div></div>
    <div class="sw" style="background:#1B2026"><div class="name">hover</div><div class="hex">#1B2026</div></div>
    <div class="sw" style="background:#22272E"><div class="name">border</div><div class="hex">#22272E</div></div>
  </div>
  <div class="section-lbl">Dark text</div>
  <div class="row">
    <div class="sw" style="background:#5E6773"><div class="name">fg4</div><div class="hex">#5E6773</div></div>
    <div class="sw" style="background:#8B94A0;color:#0B0D10"><div class="name">fg3</div><div class="hex">#8B94A0</div></div>
    <div class="sw" style="background:#BFC6CF;color:#0B0D10"><div class="name">fg2</div><div class="hex">#BFC6CF</div></div>
    <div class="sw" style="background:#F2F4F7;color:#0B0D10"><div class="name">fg1</div><div class="hex">#F2F4F7</div></div>
  </div>
</div>
</body></html>
