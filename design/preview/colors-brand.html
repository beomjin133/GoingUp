<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#fff;font-family:var(--gu-font-sans);color:var(--gu-fg1)}
.wrap{padding:22px}
.row{display:flex;gap:10px}
.sw{flex:1;border-radius:10px;padding:14px;height:88px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--gu-border)}
.name{font-size:12px;font-weight:600}
.hex{font-family:var(--gu-font-mono);font-size:11px;opacity:.7}
.light{color:#fff}
</style></head><body>
<div class="wrap">
  <div class="row">
    <div class="sw light" style="background:#1A55F0;border:none"><div class="name">Primary</div><div class="hex">#1A55F0</div></div>
    <div class="sw light" style="background:#0E44D5;border:none"><div class="name">Primary / Hover</div><div class="hex">#0E44D5</div></div>
    <div class="sw light" style="background:#0937B5;border:none"><div class="name">Primary / Press</div><div class="hex">#0937B5</div></div>
    <div class="sw" style="background:#E8EFFE"><div class="name">Primary / Soft</div><div class="hex">#E8EFFE</div></div>
    <div class="sw light" style="background:#FFB020;border:none;color:#3A2A00"><div class="name">Accent · Premium</div><div class="hex">#FFB020</div></div>
  </div>
</div>
</body></html>
